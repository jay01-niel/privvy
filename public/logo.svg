<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="hex-grad" x1="20" y1="5" x2="90" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4b0ff"/>
      <stop offset="50%" stop-color="#bc45ff"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>
    <linearGradient id="sq-grad" x1="15" y1="40" x2="85" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#bc45ff"/>
      <stop offset="100%" stop-color="#6a1fbf"/>
    </linearGradient>
    <!-- 4-pointed star sparkle -->
    <mask id="star-mask">
      <rect width="120" height="120" fill="white"/>
      <path d="M55 62 C55 52, 60 48, 60 38 C60 48, 65 52, 65 62 C65 72, 60 76, 60 86 C60 76, 55 72, 55 62 Z" fill="black"/>
      <path d="M50 62 C40 62, 36 60, 26 60 C36 60, 40 58, 50 58 C60 58, 64 60, 74 60 C64 60, 60 62, 50 62 Z" fill="black" transform="rotate(90, 60, 60)"/>
    </mask>
  </defs>
  <!-- Hexagon -->
  <polygon points="60,8 98,30 98,72 60,94 22,72 22,30" fill="url(#hex-grad)" opacity="0.85"/>
  <!-- Rounded square (offset lower-left) -->
  <rect x="18" y="38" width="60" height="60" rx="16" fill="url(#sq-grad)" opacity="0.75" mask="url(#star-mask)"/>
  <!-- Star sparkle overlay (bright) -->
  <path d="M48 68 C48 56, 52 50, 52 38 C52 50, 56 56, 56 68 C56 80, 52 86, 52 98 C52 86, 48 80, 48 68 Z" fill="white" opacity="0.9"/>
  <path d="M52 64 C40 64, 34 68, 22 68 C34 68, 40 72, 52 72 C64 72, 70 68, 82 68 C70 68, 64 64, 52 64 Z" fill="white" opacity="0.9"/>
</svg>
